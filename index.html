<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lo.Krain — Io</title>

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="cover.jpg" />
  <link rel="apple-touch-icon" href="cover.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-bg"></div>
  <div class="noise"></div>

  <main class="release-page">
    <section class="release-layout">

      <!-- LEFT COLUMN -->
      <aside class="release-sidebar">
        <div class="cover-panel">
          <img src="cover.jpg" alt="Io album cover" class="cover-image" />
        </div>

        <div class="album-copy card">
          <div class="eyebrow">Release</div>
          <h2 class="copy-title">Io</h2>
          <p class="copy-text">
            An album that closes a 15-year journey from night to dawn.
            Even if your path feels unclear now, that doesn’t make it meaningless.
          </p>
        </div>

        <div class="artist-card card">
          <img src="artist.jpg" alt="Lo.Krain" class="artist-photo" />
          <div class="artist-meta">
            <div class="artist-name">Lo.Krain</div>
            <div class="artist-sub">Artist / Project</div>
          </div>
        </div>

        <div class="links-card card">
          <a class="external-link" href="https://lokrain.bandcamp.com/album/io" target="_blank" rel="noopener noreferrer">
            Lo.Krain Myth
          </a>
          <a class="external-link" href="https://youtu.be/314YBGas0OQ" target="_blank" rel="noopener noreferrer">
            Virtual CD
          </a>
        </div>
      </aside>

      <!-- RIGHT COLUMN -->
      <section class="player-section card">
        <div class="player-header">
          <div class="player-header-main">
            <div class="eyebrow">Album</div>
            <h1 class="release-title">Io</h1>
            <div class="release-meta">Lo.Krain · 2026</div>
          </div>

          <div class="visual-side">
            <div class="disc-stack">
              <div class="disc-shadow"></div>
              <div class="disc">
                <img src="artist.jpg" alt="Artist visual" class="disc-image" />
              </div>
            </div>
          </div>
        </div>

        <div class="now-playing card-inline">
          <div class="now-label">Now Playing</div>
          <div class="now-track" id="trackTitle">Путь</div>
          <div class="now-artist" id="trackArtist">Lo.Krain</div>
        </div>

        <div class="progress-section">
          <div class="progress-wrap" id="progressWrap">
            <div class="progress-bar">
              <div class="progress" id="progress"></div>
            </div>
          </div>

          <div class="time-row">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
          </div>
        </div>

        <div class="controls">
          <button class="control-btn" id="prevBtn" aria-label="Previous">⏮</button>
          <button class="control-btn main-btn" id="playBtn" aria-label="Play / Pause">▶</button>
          <button class="control-btn" id="nextBtn" aria-label="Next">⏭</button>
        </div>

        <div class="sub-controls">
          <button class="mini-btn" id="shuffleBtn">Shuffle: Off</button>
          <button class="mini-btn" id="repeatBtn">Repeat: All</button>

          <div class="volume-box">
            <span>Volume</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" />
          </div>
        </div>

        <div class="playlist-head">
          <div class="playlist-title">Tracklist</div>
          <div class="playlist-count" id="playlistCount">10 tracks</div>
        </div>

        <div class="playlist" id="playlist"></div>
      </section>
    </section>
  </main>

  <audio id="audio" preload="metadata"></audio>

  <script src="script.js"></script>
</body>
</html>
